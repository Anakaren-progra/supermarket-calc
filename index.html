<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Supermarket Calc</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d6efd"/>

  <!-- Estilos -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>

<body class="bg-light">

  <div class="container py-4">
    <h1 class="text-center mb-4">🛒 Supermarket Calc</h1>

    <!-- FORMULARIO -->
    <div class="card p-3 mb-3 shadow-sm">
      <div class="row g-2">
        <div class="col-md-5">
          <input id="producto" type="text" class="form-control" placeholder="Producto"/>
        </div>
        <div class="col-md-3">
          <input id="precio" type="number" class="form-control" placeholder="Precio"/>
        </div>
        <div class="col-md-2">
          <button id="btnAgregar" class="btn btn-success w-100">Agregar</button>
        </div>
        <div class="col-md-2">
          <button id="btnLimpiar" class="btn btn-danger w-100">Limpiar</button>
        </div>
      </div>
    </div>

    <!-- LISTA -->
    <div class="card p-3 shadow-sm">
      <ul id="lista" class="list-group mb-3"></ul>
      <h4 class="text-end">Total: $<span id="total">0</span></h4>
    </div>
  </div>

  <!-- JS PRINCIPAL -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
